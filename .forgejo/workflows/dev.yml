name: TFB Dev env

on:
  push:
    branches:
      - main
    paths:
      - .forgejo/workflows/dev.yml
      - '.devcontainer/**'

jobs:
  build-docker-image:
    runs-on: debian
    steps:
      # Check out the repository
      - name: Checkout code
        uses: https://github.com/actions/checkout@v6

      - name: Docker CLI installation
        run: |
          apt update
          apt install -y ca-certificates curl
          curl -fsSL https://get.docker.com -o get-docker.sh
          sh get-docker.sh
    
      # Login to TFB Registry
      - name: Login to TFB Docker Registry
        uses: docker/login-action@v3
        with:
          registry: forge.theflyingbirds.net
          username: ${{ secrets.TFB_REGISTRY_USERNAME }}
          password: ${{ secrets.TFB_REGISTRY_TOKEN }}

      # Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .devcontainer/
          push: true
          tags: forge.theflyingbirds.net/tfb/dev:latest
          labels: org.opencontainers.image.source=https://forge.theflyingbirds.net/tfb/network
          build-args: |
            MAVEN_URL=${{ secrets.MAVEN_URL }}
            MAVEN_USERNAME=${{ secrets.TFB_REGISTRY_USERNAME }}
            MAVEN_PASSWORD=${{ secrets.TFB_REGISTRY_TOKEN }}

  publish-coder-template:
    runs-on: debian
    steps:
      - name: Get short commit SHA
        if: github.ref == 'refs/heads/main'
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get latest commit title
        if: github.ref == 'refs/heads/main'
        id: message
        run: echo "pr_title=$(git log --format=%s -n 1 ${{ github.sha }})" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: ./.forgejo/actions/setup-tf

      - name: Terraform init and validate
        run: |
          cd .devcontainer/tfb-dev
          terraform init -upgrade
          terraform validate
          
      # Step 2: Install the Coder CLI
      - name: Set up Coder CLI
        uses: https://github.com/coder/setup-action@v1
        with:
          access_url: ${{ secrets.CODER_URL }}
          coder_session_token: ${{ secrets.CODER_SESSION_TOKEN }}

      # Step 3: Set environment variables and push template
      - name: Push template to Coder
        run: |
          export CODER_TEMPLATE_NAME=TFB
          export CODER_TEMPLATE_DIR=.devcontainer/tfb-dev
          export CODER_TEMPLATE_VERSION=$(git rev-parse --short HEAD)

          coder templates push --yes $CODER_TEMPLATE_NAME \
              --directory $CODER_TEMPLATE_DIR \
              --name=$CODER_TEMPLATE_VERSION
